<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도서관 한방 검색</title>
    <style>
        :root { 
            --bg: #f2f4f6; --white: #ffffff; --text: #191f24; 
            --text-sub: #4e5968; --accent: #3182f6; --border: #e8eaed; 
        }
        
        /* 다크모드 대응 */
        @media (prefers-color-scheme: dark) {
            :root { 
                --bg: #121212; --white: #1e1e1e; --text: #f0f0f0; 
                --text-sub: #a0a0a0; --accent: #4d94ff; --border: #333333; 
            }
        }
        
        body { 
            padding: 20px; margin: 0; background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }
        
        .help-msg { 
            text-align: center; font-size: 14px; color: var(--text-sub); margin-bottom: 24px; 
            padding: 16px; background: var(--white); border-radius: 16px; 
        }
        
        .search-container { display: flex; gap: 8px; justify-content: center; max-width: 640px; margin: 0 auto; }
        textarea { 
            flex: 1; height: 100px; padding: 16px; border: 1px solid var(--border); 
            border-radius: 16px; background: var(--white); color: var(--text); outline: none; resize: none;
        }
        .search-btn { 
            padding: 0 24px; background: var(--accent); color: white; border: none; 
            border-radius: 16px; cursor: pointer; font-weight: 600;
        }

        .result-set { 
            padding: 24px; margin-top: 24px; border-radius: 20px; 
            background: var(--white);
        }
        .top-link-bar { display: flex; gap: 16px; margin-bottom: 20px; justify-content: center; }
        .top-link-bar a { color: var(--accent); text-decoration: none; font-size: 14px; }
        
        .frame-container { display: flex; gap: 12px; height: 400px; margin-top: 16px; }
        iframe { flex: 1; border: 1px solid var(--border); border-radius: 12px; width: 100%; height: 350px; background: #fff; }

        /* 모바일 세로모드 */
        @media (max-width: 767px) {
            .help-msg { display: none; }
            .search-container { flex-direction: column; }
            .frame-container { flex-direction: column; height: 3000px; }
            iframe { height: 1000px; }
        }

        /* 모바일 가로모드 대응 */
        @media (min-width: 480px) and (max-width: 900px) and (orientation: landscape) {
            .frame-container { height: 1500px; }
            iframe { height: 500px; }
        }
    </style>
</head>
<body>
    <div class="help-msg">
        💡 <b>검색 안내</b>: 줄바꿈은 <b>Enter</b> | 검색 실행은 <b>Shift/Ctrl/Alt/Cmd + Enter</b> 또는 우측 <b>검색 버튼</b>
    </div>

    <div class="search-container">
        <textarea id="keyword" placeholder="책 제목을 입력하세요" onkeydown="handleKey(event)"></textarea>
        <button class="search-btn" onclick="search()">검색</button>
    </div>

    <div id="results"></div>

    <script>
        function handleKey(e) {
            if (e.key === 'Enter' && (e.shiftKey || e.ctrlKey || e.altKey || e.metaKey)) {
                e.preventDefault();
                search();
            }
        }

        function search() {
            const input = document.getElementById('keyword').value;
            const keywords = input.split('\n').filter(k => k.trim() !== "");
            const container = document.getElementById('results');
            container.innerHTML = '';
            
            const manageCodes = "141025,141024,141549,141572,141552,141093,141542,141092,141537,141557,141551,141301,141595,141596,141612,141085,141086,141064,141138,341147,141107";
            
            keywords.forEach(k => {
                const enc = encodeURIComponent(k.trim());
                const yonginUrl = `https://lib.yongin.go.kr/intro/plusSearchResultList.do?searchType=SIMPLE&searchCategory=BOOK&searchKey=ALL&searchKeyword=${enc}`;
                const suwonUrl = `https://mob.suwonlib.go.kr/search?historyChk=Y&isSearchType=normal&searchTxt=${enc}&searchKind=book&manageCode=${manageCodes}&orderbyItem=ACCURACY_SORT&orderby=DESC&pageNo=1`;
                
                const div = document.createElement('div');
                div.className = 'result-set';
                div.innerHTML = `
                    <div style="font-weight: 700; margin-bottom: 8px;">"${k.trim()}" 검색 결과</div>
                    <div class="top-link-bar">
                        <a href="${suwonUrl}" target="_blank">새 창에서 수원</a>
                        <a href="${yonginUrl}" target="_blank">새 창에서 용인</a>
                    </div>
                    <div class="frame-container">
                        <iframe src="https://www.neutinamu.org/page/search/result.php?tsch=${enc}"></iframe>
                        <iframe src="https://www.snlib.go.kr/intro/menu/10041/program/30009/plusSearchResultList.do?searchType=SIMPLE&searchCategory=BOOK&searchKey=TITLE&searchKeyword=${enc}&searchPbLibrary=ALL"></iframe>
                        <iframe src="https://www.library.kr/ggl/search/search-list?search_text=${enc}"></iframe>
                    </div>
                `;
                container.appendChild(div);
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도서관 한방 검색 - 섹션 확장형</title>
    <style>
        :root { --bg: #fff; --text: #000; --border: #ccc; }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #121212; --text: #eee; --border: #444; }
        }
        body { font-family: sans-serif; padding: 10px; margin: 0; background: var(--bg); color: var(--text); }
        .search-box { margin-bottom: 20px; text-align: center; }
        #keyword, #keyword-multi { width: 400px; max-width: 100%; padding: 10px; font-size: 16px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
        #keyword-multi { height: 100px; display: none; }
        .toggle-btn { cursor: pointer; color: #2196f3; text-decoration: underline; background: none; border: none; }
        .result-set { border-top: 3px solid var(--border); margin-top: 20px; padding-top: 10px; }
        .result-title { font-size: 20px; font-weight: bold; color: #d32f2f; margin-bottom: 10px; }
        .btn-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .btn-bar button { padding: 6px 12px; cursor: pointer; background: #e0f7fa; border: 1px solid #00acc1; border-radius: 4px; font-weight: bold; }
        .frame-container { display: flex; gap: 10px; height: 400px; margin-bottom: 30px; flex-direction: column; }
        @media (min-width: 768px) { .frame-container { flex-direction: row; } }
        .frame-wrapper { flex: 1; display: flex; flex-direction: column; }
        .btn-open-new { font-size: 12px; margin-bottom: 5px; cursor: pointer; background: #eee; border: 1px solid #ccc; padding: 2px; text-align: center; color: #000; }
        iframe { flex: 1; border: 2px solid var(--border); width: 100%; }
        h3 { text-align: center; margin: 5px 0; font-size: 14px; }
        #history-bar { margin-top: 10px; font-size: 14px; }
        #history-bar span { cursor: pointer; color: #2196f3; margin: 0 5px; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="search-box">
        <div id="input-area">
            <input type="text" id="keyword" placeholder="책 제목 입력" onkeydown="if(event.key==='Enter') search()">
            <textarea id="keyword-multi" placeholder="책 제목을 줄바꿈하여 입력하세요"></textarea>
        </div>
        <button class="toggle-btn" id="toggle-btn" onclick="toggleMode()">여러 줄 입력으로 전환</button>
        <button onclick="search()">검색 실행</button>
        <div id="history-bar">최근 검색: </div>
    </div>

    <div id="results"></div>

    <script>
        let isMultiLine = false;
        const HISTORY_KEY = 'lib_search_history';

        // 페이지 로드 시 히스토리 표시
        window.onload = updateHistoryUI;

        function toggleMode() {
            const single = document.getElementById('keyword');
            const multi = document.getElementById('keyword-multi');
            const btn = document.getElementById('toggle-btn');
            isMultiLine = !isMultiLine;
            single.style.display = isMultiLine ? 'none' : 'inline-block';
            multi.style.display = isMultiLine ? 'inline-block' : 'none';
            btn.innerText = isMultiLine ? "한 줄 입력으로 전환" : "여러 줄 입력으로 전환";
        }

        function updateHistoryUI() {
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            const bar = document.getElementById('history-bar');
            bar.innerHTML = '최근 검색: ' + history.map(k => `<span onclick="runQuickSearch('${k}')">${k}</span>`).join(' | ');
        }

        function runQuickSearch(k) {
            document.getElementById('keyword').value = k;
            if(isMultiLine) toggleMode();
            search();
        }

        function openLibrary(type, enc) {
            const manageCodes = "141025,141024,141549,141572,141552,141093,141542,141092,141537,141557,141551,141301,141595,141596,141612,141085,141086,141064,141138,341147,141107";
            let url = "";
            if (type === 'yongin') {
                url = `https://lib.yongin.go.kr/intro/plusSearchResultList.do?searchType=SIMPLE&searchCategory=BOOK&searchKey=ALL&searchKeyword=${enc}`;
            } else if (type === 'suwon') {
                url = `https://mob.suwonlib.go.kr/search?historyChk=Y&isSearchType=normal&searchTxt=${decodeURIComponent(enc)}&searchKind=book&manageCode=${manageCodes}&orderbyItem=ACCURACY_SORT&orderby=DESC&pageNo=1`;
            }
            if (url) window.open(url, '_blank');
        }

        function createFrame(title, url) {
            return `
                <div class="frame-wrapper">
                    <h3>${title}</h3>
                    <div class="btn-open-new" onclick="window.open('${url}', '_blank')">[새 창에서 열기]</div>
                    <iframe src="${url}"></iframe>
                </div>
            `;
        }

        function search() {
            const input = isMultiLine ? document.getElementById('keyword-multi').value : document.getElementById('keyword').value;
            const keywords = input.split('\n').map(k => k.trim()).filter(k => k !== "");
            if(keywords.length === 0) return;

            // 히스토리 저장
            let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            history = [keywords[0], ...history.filter(k => k !== keywords[0])].slice(0, 5);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            updateHistoryUI();

            const container = document.getElementById('results');
            container.innerHTML = '';
            keywords.forEach(k => {
                const enc = encodeURIComponent(k);
                const urls = {
                    gg: `https://www.library.kr/ggl/search/search-list?search_text=${enc}`,
                    sn: `https://www.snlib.go.kr/intro/menu/10041/program/30009/plusSearchResultList.do?searchType=SIMPLE&searchCategory=BOOK&searchKey=TITLE&searchKeyword=${enc}&searchPbLibrary=ALL`,
                    nt: `https://www.neutinamu.org/page/search/result.php?tsch=${enc}`
                };
                const div = document.createElement('div');
                div.className = 'result-set';
                div.innerHTML = `
                    <div class="result-title"># "${k}" 검색 결과</div>
                    <div class="btn-bar">
                        <button onclick="openLibrary('yongin', '${enc}')">용인시 도서관 검색결과</button>
                        <button onclick="openLibrary('suwon', '${enc}')">수원시 도서관 검색결과</button>
                    </div>
                    <div class="frame-container">
                        ${createFrame("경기사이버도서관", urls.gg)}
                        ${createFrame("성남시 도서관", urls.sn)}
                        ${createFrame("느티나무 도서관", urls.nt)}
                    </div>
                `;
                container.appendChild(div);
            });
        }
    </script>
</body>
</html>
